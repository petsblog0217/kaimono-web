<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#F7F7F5" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="かいものメモ" />
<link rel="apple-touch-icon" href="icon-180.png" />
<title>かいものメモ</title>
<style>
  :root{
    --bg:#F7F7F5; --card:#FFFFFF; --ink:#2B2B2B; --ink-2:#6E6E68; --muted:#A6A6A0; --line:#ECEAE6;
    --accent:#7FB893; --accent-soft:#E9F3EC;
    --shadow-sm:0 1px 2px rgba(30,28,24,.04);
    --shadow:0 1px 2px rgba(30,28,24,.05), 0 8px 22px rgba(30,28,24,.05);
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg);}

  header{padding:calc(env(safe-area-inset-top) + 14px) 18px 6px;display:flex;align-items:center;gap:12px;}
  .title{font-size:23px;font-weight:800;letter-spacing:.02em;flex:1;}
  .title small{display:block;font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.2em;margin-top:1px;}
  .icon-btn{width:38px;height:38px;border:none;background:var(--card);border-radius:50%;display:grid;place-items:center;box-shadow:var(--shadow-sm);color:var(--ink-2);cursor:pointer;flex:0 0 auto;}
  .icon-btn:active{transform:scale(.93);}
  .icon-btn svg{width:19px;height:19px;}
  .hdr-stock{display:flex;align-items:center;gap:6px;padding:9px 15px;border:none;border-radius:999px;background:#5C5C57;color:#fff;font-size:13.5px;font-weight:800;cursor:pointer;flex:0 0 auto;box-shadow:0 4px 12px rgba(30,28,24,.16);transition:transform .12s ease,box-shadow .2s ease;}
  .hdr-stock:active{transform:scale(.95);}
  .hdr-stock svg{width:17px;height:17px;}
  .hdr-stock.active{box-shadow:0 0 0 3px rgba(92,92,87,.28),0 4px 12px rgba(30,28,24,.16);}

  /* ===== タブ ===== */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:6px 16px 12px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:8px 14px 8px 11px;background:var(--card);border:1px solid var(--line);border-radius:999px;font-size:13.5px;font-weight:700;color:var(--ink-2);cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s ease;}
  .tab:active{transform:scale(.96);}
  .tab svg{width:16px;height:16px;}
  .tab.active{color:#fff;border-color:transparent;}

  main{flex:1;overflow-y:auto;padding:4px 16px 120px;}

  /* ===== お店セクション ===== */
  .section{margin-bottom:22px;}
  .sec-head{display:flex;align-items:center;gap:11px;padding:0 4px 10px;}
  .sec-ic{width:36px;height:36px;border-radius:11px;flex:0 0 auto;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;}
  .sec-ic svg{width:20px;height:20px;}
  .sec-dot{width:16px;height:16px;border-radius:50%;flex:0 0 auto;}
  .tab-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .set-dot{width:22px;height:22px;border-radius:50%;flex:0 0 auto;}
  .sec-name{font-size:17px;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sec-remain{font-size:11.5px;font-weight:700;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:2px 9px;border-radius:999px;}
  .sec-add{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;box-shadow:0 3px 10px rgba(30,28,24,.12);}
  .sec-add:active{transform:scale(.9);}
  .sec-add svg{width:18px;height:18px;}

  .sub-head{font-size:11px;font-weight:800;color:var(--ink-2);letter-spacing:.04em;padding:6px 6px 5px;}

  /* 2列タイル */
  .grid{display:grid;grid-template-columns:1fr;gap:8px;}
  .tile{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px 10px;cursor:pointer;box-shadow:var(--shadow-sm);transition:background .15s ease,transform .1s ease;min-width:0;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  .tile:active{transform:scale(.98);background:var(--accent-soft);}
  .tile .ic{width:32px;height:32px;flex:0 0 auto;border-radius:9px;background:var(--accent-soft);border:1px solid var(--line);display:grid;place-items:center;color:var(--accent);cursor:pointer;transition:transform .1s ease,background .2s ease,color .2s ease;}
  .tile .ic:active{transform:scale(.86);background:var(--accent);color:#fff;}
  .tile .ic svg{width:17px;height:17px;}
  .tile .nm{flex:1;min-width:0;font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s ease;}
  .tile .qz{font-size:11px;font-weight:800;color:var(--ink-2);background:var(--bg);border-radius:7px;padding:1px 6px;}
  .tile .ck{width:20px;height:20px;flex:0 0 auto;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;color:#fff;transition:all .2s ease;}
  .tile .ck svg{width:12px;height:12px;opacity:0;transform:scale(.5);transition:all .2s ease;}
  .tile.done{background:var(--bg);}
  .tile.done .nm{color:var(--muted);text-decoration:line-through;text-decoration-thickness:1.5px;}
  .tile.done .ic{background:var(--card);color:var(--muted);}
  .tile.done .qz{opacity:.4;}
  .tile.done .ck{background:var(--accent);border-color:var(--accent);}
  .tile.done .ck svg{opacity:1;transform:scale(1);}

  .sec-empty{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:15px;display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;}
  .sec-empty:active{background:var(--accent-soft);}
  .sec-empty .pl{width:30px;height:30px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex:0 0 auto;}
  .sec-empty .pl svg{width:16px;height:16px;}
  .clear-done{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px auto 0;background:none;border:none;color:var(--accent);font-size:12px;font-weight:800;padding:7px 12px;cursor:pointer;}
  .clear-done:active{opacity:.6;}
  .clear-done svg{width:15px;height:15px;}

  /* ===== 在庫ページ ===== */
  .stock-lead{font-size:13px;font-weight:600;color:var(--ink-2);padding:2px 4px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .stock-grid{display:grid;grid-template-columns:1fr;gap:9px;}
  .stk{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:11px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:9px;transition:opacity .2s ease;}
  .stk-top{display:flex;align-items:center;gap:9px;}
  .stk .ic{width:32px;height:32px;flex:0 0 auto;border-radius:9px;background:var(--accent-soft);display:grid;place-items:center;color:var(--accent);}
  .stk .ic svg{width:18px;height:18px;}
  .stk .nm{flex:1;min-width:0;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stk-del{width:24px;height:24px;border:none;background:var(--bg);border-radius:7px;color:var(--muted);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .stk-del:active{color:#D9534F;}
  .stk-del svg{width:14px;height:14px;}
  .stk-bot{display:flex;align-items:center;gap:8px;}
  .step{display:flex;align-items:center;gap:2px;background:var(--bg);border-radius:10px;padding:2px;}
  .step button{width:26px;height:26px;border:none;background:none;color:var(--ink-2);font-size:17px;font-weight:800;cursor:pointer;border-radius:8px;display:grid;place-items:center;}
  .step button:active{background:var(--card);}
  .step .n{min-width:24px;text-align:center;font-size:14px;font-weight:800;}
  .to-cart{margin-left:auto;display:flex;align-items:center;justify-content:center;gap:5px;background:var(--accent-soft);color:var(--accent);border:none;border-radius:10px;padding:8px 18px;font-size:12.5px;font-weight:800;cursor:pointer;}
  .to-cart:active{transform:scale(.97);}
  .to-cart svg{width:15px;height:15px;}
  /* 在庫0：薄くするのはアイコン・名前・数量だけ。カゴへ／ゴミ箱は明るいまま */
  .stk.zero .ic{background:var(--bg);color:var(--muted);opacity:.5;}
  .stk.zero .nm{color:var(--muted);}
  .stk.zero .step{opacity:.5;}

  .page-empty{text-align:center;color:var(--muted);padding:60px 30px;}
  .page-empty .big{width:60px;height:60px;border-radius:18px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 14px;color:var(--accent);box-shadow:var(--shadow-sm);}
  .page-empty .big svg{width:28px;height:28px;}
  .page-empty p{margin:4px 0;font-size:14px;font-weight:600;}
  .page-empty .sub{font-size:12.5px;color:var(--muted);font-weight:500;}

  /* ===== 追加シート ===== */
  .scrim{position:fixed;inset:0;background:rgba(30,28,24,.32);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:30;backdrop-filter:blur(2px);}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--bg);border-radius:26px 26px 0 0;padding:10px 20px calc(env(safe-area-inset-bottom) + 20px);z-index:31;transition:transform .32s cubic-bezier(.25,.9,.3,1);box-shadow:0 -10px 40px rgba(30,28,24,.16);max-height:88vh;max-height:88dvh;display:flex;flex-direction:column;}
  .sheet.show{transform:translateX(-50%) translateY(0);}
  .grip{width:38px;height:5px;border-radius:999px;background:var(--line);margin:6px auto 13px;}
  .sheet-x{position:absolute;top:13px;right:15px;width:32px;height:32px;border:none;border-radius:50%;background:var(--card);color:var(--ink-2);font-size:21px;font-weight:700;line-height:1;display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow-sm);z-index:2;}
  .sheet-x:active{transform:scale(.9);}
  .sheet .grip{cursor:pointer;}
  .sheet h3{margin:0 0 3px;font-size:18px;font-weight:800;}
  .sheet .hint{font-size:12px;color:var(--muted);font-weight:600;margin:0 0 13px;}
  .search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow-sm);}
  .search svg{width:19px;height:19px;color:var(--muted);flex:0 0 auto;}
  .search input{border:none;background:none;outline:none;font-size:16px;font-weight:600;color:var(--ink);width:100%;font-family:inherit;}
  .search input::placeholder{color:var(--muted);font-weight:500;}
  .sort-toggle{display:flex;gap:6px;margin-top:11px;}
  .sort-toggle button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink-2);border-radius:10px;padding:8px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .1s ease;}
  .sort-toggle button:active{transform:scale(.97);}
  .sort-toggle button.sel{background:var(--accent);color:#fff;border-color:transparent;}
  .suggest{margin-top:12px;overflow-y:auto;flex:1;min-height:0;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
  .sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .sug-tile{display:flex;align-items:center;gap:9px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:8px 10px;cursor:pointer;transition:transform .1s ease,background .15s ease;min-width:0;}
  .sug-tile:active{transform:scale(.96);background:var(--accent-soft);}
  .sug-tile .sug-icon{width:30px;height:30px;flex:0 0 auto;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;}
  .sug-tile .sug-icon svg{width:17px;height:17px;}
  .sug-tile .sug-name{flex:1;min-width:0;font-size:12.5px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .new-card{background:var(--card);border:1.5px dashed var(--accent);border-radius:14px;padding:14px;margin-bottom:8px;}
  .new-top{font-size:14px;font-weight:700;margin-bottom:11px;}
  .new-top b{color:var(--accent);}
  .cat-pick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;}
  .cat-chip{font-size:12.5px;font-weight:700;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);padding:7px 12px;border-radius:999px;cursor:pointer;}
  .cat-chip.sel{background:var(--accent);color:#fff;border-color:transparent;}
  .new-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .reg-toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;user-select:none;}
  .reg-toggle .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;color:#fff;transition:all .15s ease;}
  .reg-toggle .box svg{width:13px;height:13px;opacity:0;}
  .reg-toggle.on .box{background:var(--accent);border-color:var(--accent);}
  .reg-toggle.on .box svg{opacity:1;}
  .add-btn{background:var(--accent);color:#fff;border:none;padding:11px 20px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;}
  .add-btn:active{transform:scale(.96);}

  .icon-btn.active{background:#5C5C57;color:#fff;}

  /* ===== 設定・管理 ===== */
  .set-h{font-size:13px;font-weight:800;color:var(--ink-2);letter-spacing:.04em;padding:6px 4px 10px;}
  .set-list{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
  .set-row{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;box-shadow:var(--shadow-sm);}
  .set-row .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;}
  .set-row .ic svg{width:19px;height:19px;}
  .set-row .nm{flex:1;min-width:0;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .set-row .nm small{display:block;font-size:11px;color:var(--muted);font-weight:600;}
  .mini-btn{border:none;background:var(--bg);color:var(--ink-2);border-radius:9px;padding:7px 11px;font-size:12.5px;font-weight:800;cursor:pointer;flex:0 0 auto;}
  .mini-btn:active{transform:scale(.95);}
  .mini-btn.del{color:#C97B6B;}
  .add-row{display:flex;align-items:center;justify-content:center;gap:7px;background:none;border:1.5px dashed var(--line);border-radius:14px;padding:13px;color:var(--ink-2);font-size:13.5px;font-weight:800;cursor:pointer;width:100%;}
  .add-row:active{background:var(--accent-soft);}
  .add-row svg{width:17px;height:17px;}

  /* 辞書（商品）管理 */
  .dict-group{margin-bottom:8px;}
  .dict-gh{display:flex;align-items:center;gap:10px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;cursor:pointer;box-shadow:var(--shadow-sm);font-family:inherit;color:var(--ink);}
  .dict-gh:active{transform:scale(.99);}
  .dict-gh .dot{width:15px;height:15px;border-radius:50%;flex:0 0 auto;}
  .dict-gh .gname{flex:1;font-size:14.5px;font-weight:800;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dict-gh .cnt{font-size:11.5px;font-weight:800;color:var(--muted);background:var(--bg);border-radius:999px;padding:2px 9px;}
  .dict-gh .chev{width:18px;height:18px;color:var(--muted);flex:0 0 auto;transition:transform .22s ease;}
  .dict-gh.open .chev{transform:rotate(180deg);}
  .dict-grid{display:grid;grid-template-columns:1fr;gap:8px;margin:8px 0 10px;}
  .dict-card{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:8px 9px;cursor:pointer;box-shadow:var(--shadow-sm);min-width:0;transition:background .15s ease,transform .1s ease;}
  .dict-card:active{transform:scale(.98);background:var(--accent-soft);}
  .dict-card .ic{width:30px;height:30px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;}
  .dict-card .ic svg{width:17px;height:17px;}
  .dict-card .tx{flex:1;min-width:0;}
  .dict-card .nm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dict-card .ct{font-size:10.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .dict-card .x{width:24px;height:24px;border:none;background:var(--bg);border-radius:7px;color:var(--muted);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
  .dict-card .x:active{color:#C97B6B;}
  .dict-card .x svg{width:13px;height:13px;}
  .dict-add{display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:1.5px dashed var(--line);border-radius:13px;padding:9px;color:var(--ink-2);font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;min-height:48px;}
  .dict-add:active{background:var(--accent-soft);}
  .dict-add svg{width:15px;height:15px;}

  /* 家族と共有 */
  .share-code{font-size:30px;font-weight:800;letter-spacing:.1em;text-align:center;background:var(--card);border:1.5px dashed var(--line);border-radius:14px;padding:18px 12px;margin:8px 0 4px;user-select:all;word-break:break-all;}
  .share-status{display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--ink-2);margin:10px 0 16px;}
  .share-status .d{width:9px;height:9px;border-radius:50%;background:var(--muted);}
  .share-status.on .d{background:#4CAF82;}
  .share-steps{font-size:12.5px;line-height:1.75;color:var(--ink-2);background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
  .share-steps b{color:var(--ink);}
  .share-steps code{background:var(--bg);padding:1px 5px;border-radius:5px;font-size:11.5px;}

  /* 商品ミニメニュー（長押し） */
  .im-step{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--bg);border-radius:16px;padding:8px;margin:4px 0 8px;}
  .im-step button{width:50px;height:50px;border:none;background:var(--card);color:var(--ink);font-size:26px;font-weight:800;border-radius:13px;cursor:pointer;box-shadow:var(--shadow-sm);display:grid;place-items:center;}
  .im-step button:active{transform:scale(.93);}
  .im-step .n{min-width:64px;text-align:center;font-size:24px;font-weight:800;}

  /* エディタ */
  #storeEditBody h3{margin:2px 0 4px;font-size:19px;font-weight:800;}
  .ed-label{font-size:12px;font-weight:800;color:var(--ink-2);margin:15px 2px 7px;}
  .ed-input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:12px 14px;font-size:16px;font-weight:600;color:var(--ink);font-family:inherit;outline:none;}
  .ed-input:focus{border-color:var(--accent);}
  .swatches{display:flex;flex-wrap:wrap;gap:9px;}
  .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-shadow:var(--shadow-sm);transition:transform .1s ease;}
  .sw:active{transform:scale(.9);}
  .sw.sel{border-color:var(--ink);}
  .icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;max-height:168px;overflow-y:auto;padding:2px;}
  .ic-pick{aspect-ratio:1;border-radius:11px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;color:var(--ink-2);}
  .ic-pick svg{width:20px;height:20px;}
  .ic-pick.sel{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .cat-edit{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .cat-edit input{flex:1;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:9px 12px;font-size:14px;font-weight:600;font-family:inherit;outline:none;color:var(--ink);}
  .cat-edit input:focus{border-color:var(--accent);}
  .cat-edit .x{width:32px;height:32px;border:none;background:var(--bg);border-radius:9px;color:var(--muted);cursor:pointer;flex:0 0 auto;display:grid;place-items:center;}
  .cat-edit .x svg{width:15px;height:15px;}

/* 並び替え用：カテゴリの順位（店の定義順→未定義→なしの順で後ろへ）と、名前から読みを引く */
function catRank(store,cat){ if(!cat) return 9999; const i=store.cats.indexOf(cat); return i<0?9998:i; }
function readingOf(name){ const d=dictFind(name); return toHira((d&&d.reading)||name); }
function softOf(hex){ if(!hex) return null; const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return 'rgba('+r+','+g+','+b+',.16)'; }

/* 既存ユーザーにも追加候補を一度だけ足す。同じ名前＋お店があれば足さない（重複・消した物の復活を防ぐ）。
   共有中（部屋）で同期データに未シードなら、足してから部屋にも反映する */
function seedExtraDict(push){
  if(state.extraSeeded) return false;
  let added=0;
  EXTRA_DICT.forEach(d=>{ if(!DICT.some(x=>x.name===d.name && x.store===d.store)){ DICT.push({id:uid(),color:'',...d}); added++; } });
  state.extraSeeded=true;
  localStorage.setItem(SKEY, JSON.stringify(state));
  if(push && fbReady && fbRef) pushState();
  return added>0;
}

/* ===== タブ ===== */
let tab='all'; // 'all' | store.id | 'stock'
function renderTabs(){
  const wrap=$('#tabs'); wrap.innerHTML='';
  const list=[{id:'all',name:'ホーム',icon:'grid',accent:NEUTRAL.accent},
    ...STORES.map(s=>({id:s.id,name:s.name,icon:s.icon,accent:s.accent}))];
  list.forEach(t=>{
    const el=document.createElement('button');
    el.className='tab'+(t.id===tab?' active':'');
    if(t.id===tab) el.style.background=t.accent;
    const mark = t.id==='all' ? svgIcon('grid')
      : '<span class="tab-dot" style="background:'+(t.id===tab?'#fff':t.accent)+'"></span>';
    el.innerHTML=mark+t.name;
    el.onclick=()=>{ tab=t.id; render(); };
    wrap.appendChild(el);
  });
}

/* ===== メイン描画 ===== */
function render(){
  renderTabs();
  $('#stockBtn').classList.toggle('active', tab==='stock');
  $('#settingsBtn').classList.toggle('active', tab==='settings');
  $('#shareBtn').classList.toggle('active', !!share.roomCode);
  const v=$('#view'); v.innerHTML='';
  if(tab==='settings'){ v.style.setProperty('--accent',NEUTRAL.accent); v.style.setProperty('--accent-soft','#EDEBE7'); renderSettings(v); return; }
  if(tab==='stock'){ v.style.setProperty('--accent',NEUTRAL.accent); v.style.setProperty('--accent-soft','#EDEBE7'); renderStock(v); return; }
  if(tab!=='all' && !storeById(tab)) tab='all';
  const stores = (tab==='all') ? STORES : [storeById(tab)];
  stores.forEach(store=> v.appendChild(storeSection(store)));
}

let dictFilter='';
let dictOpen=new Set();   // 展開中のお店id（既定はたたんだ状態）
function renderDictList(box){
  box=box||$('#dictList'); if(!box) return;
  box.innerHTML='';
  const f=toHira(dictFilter), typed=dictFilter.trim();
  const filtering=!!typed;
  let shown=0;
  STORES.forEach(store=>{
    let items=DICT.filter(d=>d.store===store.id);
    if(f) items=items.filter(d=> toHira(d.reading).includes(f) || toHira(d.name).includes(f) || (typed&&d.name.includes(typed)));
    if(!items.length) return;
    items.sort((a,b)=> (catRank(store,a.category)-catRank(store,b.category)) || readingOf(a.name).localeCompare(readingOf(b.name),'ja'));
    shown++;
    const open = filtering || dictOpen.has(store.id);
    const grp=document.createElement('div'); grp.className='dict-group';
    const gh=document.createElement('button'); gh.className='dict-gh'+(open?' open':'');
    gh.innerHTML='<span class="dot" style="background:'+store.accent+'"></span>'+
      '<span class="gname">'+esc(store.name)+'</span><span class="cnt">'+items.length+'</span>'+
      '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
    if(!filtering) gh.onclick=()=>{ dictOpen.has(store.id)?dictOpen.delete(store.id):dictOpen.add(store.id); renderDictList(); };
    grp.appendChild(gh);
    if(open){
      const g=document.createElement('div'); g.className='dict-grid';
      g.style.setProperty('--accent-soft',store.soft);
      items.forEach(d=>{
        const card=document.createElement('div'); card.className='dict-card';
        card.innerHTML='<span class="ic" style="background:'+store.soft+';color:'+store.accent+'">'+svgIcon(d.icon)+'</span>'+
          '<div class="tx"><div class="nm">'+esc(d.name)+'</div>'+(d.category?'<div class="ct">'+esc(d.category)+'</div>':'')+'</div>'+
          '<button class="x" title="削除">'+svgIcon('trash')+'</button>';
        card.onclick=()=>openDictEditor(d);
        card.querySelector('.x').onclick=e=>{ e.stopPropagation(); deleteDict(d); };
        g.appendChild(card);
      });
      if(!filtering){
        const addc=document.createElement('button'); addc.className='dict-add'; addc.innerHTML=plusSvg+'追加';
        addc.onclick=()=>openDictEditor(null,store.id);
        g.appendChild(addc);
      }

function storeSection(store){
  const items=state.items[store.id]||[];
  const remain=items.filter(i=>!i.done).length;
  const done=items.filter(i=>i.done).length;
  const sec=document.createElement('section'); sec.className='section';
  sec.style.setProperty('--accent',store.accent);
  sec.style.setProperty('--accent-soft',store.soft);

  const head=document.createElement('div'); head.className='sec-head';
  head.innerHTML='<span class="sec-dot" style="background:'+store.accent+'"></span><div class="sec-name">'+store.name+'</div>'+
    (remain>0?'<span class="sec-remain">のこり '+remain+'</span>':(items.length>0?'<span class="sec-remain">完了</span>':''));
  const addBtn=document.createElement('button'); addBtn.className='sec-add'; addBtn.innerHTML=plusSvg;
  addBtn.onclick=()=>openSheet('list',store.id); head.appendChild(addBtn);
  sec.appendChild(head);

  if(items.length===0){
    const e=document.createElement('div'); e.className='sec-empty';
    e.innerHTML='<div class="pl">'+plusSvg+'</div>まだありません。タップで追加';
    e.onclick=()=>openSheet('list',store.id); sec.appendChild(e);
  }else if(store.cats.length>0){
    const cats=store.cats.slice();
    items.forEach(i=>{ const c=i.category||'その他'; if(!cats.includes(c)) cats.push(c); });
    cats.forEach(cat=>{
      const inCat=items.filter(i=>(i.category||'その他')===cat).sort((a,b)=> readingOf(a.name).localeCompare(readingOf(b.name),'ja'));
      if(inCat.length===0) return;
      const sh=document.createElement('div'); sh.className='sub-head'; sh.textContent=cat; sec.appendChild(sh);
      const g=document.createElement('div'); g.className='grid';
      inCat.forEach(it=> g.appendChild(tile(it,store.id))); sec.appendChild(g);
    });
  }else{
    const g=document.createElement('div'); g.className='grid';
    items.slice().sort((a,b)=> readingOf(a.name).localeCompare(readingOf(b.name),'ja')).forEach(it=> g.appendChild(tile(it,store.id)));
    sec.appendChild(g);
  }

  if(done>0){
    const btn=document.createElement('button'); btn.className='clear-done';
    btn.innerHTML=svgIcon('house')+'買ったもの（'+done+'）を在庫へ';
    btn.onclick=()=>clearBought(store.id); sec.appendChild(btn);
  }
  return sec;
}

function clearBought(storeId){
  const arr=state.items[storeId]||[];
  arr.filter(i=>i.done).forEach(i=> addToStock(i.name,i.icon,storeId,i.qty||1,i.color||''));
  state.items[storeId]=arr.filter(i=>!i.done);
  save(); render();

function addToStock(name,icon,store,qty,color){
  const ex=state.stock.find(s=>s.name===name);
  if(ex){ ex.qty+=qty; if(!ex.icon||ex.icon==='default') ex.icon=icon; if(color&&!ex.color) ex.color=color; }
  else state.stock.push({id:uid(),name,icon,store,qty,color:color||''});
}

function stockCard(s){
  const store=storeById(s.store)||STORES[0];
  const el=document.createElement('div'); el.className='stk'+(s.qty<=0?' zero':'');
  el.style.setProperty('--accent',s.color||store.accent); el.style.setProperty('--accent-soft',s.color?softOf(s.color):store.soft);
  el.innerHTML=
    '<div class="stk-top"><div class="ic">'+svgIcon(s.icon)+'</div><div class="nm">'+esc(s.name)+'</div>'+
      '<button class="stk-del" title="削除">'+svgIcon('trash')+'</button></div>'+
    '<div class="stk-bot"><div class="step"><button class="mi">−</button><span class="n">'+s.qty+'</span><button class="pl">＋</button></div>'+

  el.querySelector('.to-cart').onclick=()=>{ stockToList(s); };

function stockToList(s){
  const d=dictFind(s.name);
  const store=s.store||(d&&d.store)||STORES[0].id;
  const cat=(d&&d.category)||'';
  const color=s.color||(d&&d.color)||'';

  const ex=arr.find(i=>i.name===s.name && (i.category||'')===(cat||''));
  if(ex){ ex.qty++; ex.done=false; } else arr.push({id:uid(),name:s.name,category:cat,icon:s.icon,color,qty:1,done:false});

}

/* ===== 追加シート ===== */
const sheet=$('#sheet'),scrim=$('#scrim'),input=$('#searchInput'),suggest=$('#suggest');
let sheetMode='list',sheetStore=null,newCat=null,regOn=true,newIcon='default',newColor='';
let newReading='',newReadingTouched=false;
let suggestSort=localStorage.getItem('kaimono-sort')||'kana';   // 'kana'(50音) | 'freq'(よく買う順)
scrim.onclick=closeSheet;
$('#sheetClose').onclick=closeSheet;
$('#sheet .grip').onclick=closeSheet;
const KANA_ONLY=/^[ぁ-んゔ ー]+$/;
input.addEventListener('input',e=>{
  const v=e.target.value;
  if(v.trim()===''){ newReading=''; newReadingTouched=false; }
  else if(!e.isComposing && !newReadingTouched && KANA_ONLY.test(v.trim())){ newReading=toHira(v.trim()); }
  renderSuggest(v);
});
/* IME入力を拾う：漢字に変換する前に打ったひらがなを、ふりがなとして自動セット */
function captureIme(el, onKana){
  let kana='';
  el.addEventListener('compositionstart',()=>{ kana=''; });
  el.addEventListener('compositionupdate',ev=>{ const d=ev.data||''; if(KANA_ONLY.test(d)) kana=d; });
  el.addEventListener('compositionend',()=>{ if(kana) onKana(toHira(kana)); kana=''; });
}
captureIme(input, rd=>{ if(!newReadingTouched){ newReading=rd; renderSuggest(input.value); } });
function renderSortToggle(){
  const t=$('#sortToggle'); if(!t) return;
  t.innerHTML='<button data-s="kana"'+(suggestSort==='kana'?' class="sel"':'')+'>50音順</button>'+
    '<button data-s="freq"'+(suggestSort==='freq'?' class="sel"':'')+'>よく買う順</button>';
  t.querySelectorAll('button').forEach(b=> b.onclick=()=>{ suggestSort=b.dataset.s; localStorage.setItem('kaimono-sort',suggestSort); renderSortToggle(); renderSuggest(input.value); });
}
function bumpFreq(d){ if(d) d.freq=(d.freq||0)+1; }
$('#shareBtn').onclick=openShareSheet;
$('#stockBtn').onclick=()=>{ tab='stock'; render(); };
$('#settingsBtn').onclick=()=>{ tab='settings'; render(); };

function openSheet(mode,storeId){
  sheetMode=mode; sheetStore=storeId; input.value=''; newCat=null; regOn=true; newIcon='default'; newColor='';
  newReading=''; newReadingTouched=false;
  if(mode==='stock'){ sheet.style.setProperty('--accent',NEUTRAL.accent); sheet.style.setProperty('--accent-soft','#EDEBE7'); $('#sheetTitle').textContent='在庫に追加'; }
  else{ const st=storeById(storeId); sheet.style.setProperty('--accent',st.accent); sheet.style.setProperty('--accent-soft',st.soft); $('#sheetTitle').textContent=st.name+'に追加'; }
  renderSortToggle(); renderSuggest('');
  scrim.classList.add('show'); sheet.classList.add('show');
  setTimeout(()=>input.focus(),280);
}
function closeSheet(){ scrim.classList.remove('show'); sheet.classList.remove('show'); input.blur(); }
function toHira(s){ return s.replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60)).toLowerCase().trim(); }

function renderSuggest(q){
  const qq=toHira(q); suggest.innerHTML='';
  const store = sheetMode==='list' ? storeById(sheetStore) : null;
  let pool = sheetMode==='list' ? DICT.filter(d=>d.store===sheetStore) : DICT;
  let matches=(qq==='')? pool.slice()
    : pool.filter(d=> toHira(d.reading).startsWith(qq) || toHira(d.name).startsWith(qq) || d.name.includes(q.trim()));
  const hasCats = store && store.cats.length>0;
  /* 並び順：よく買う順なら頻度→（同数なら）カテゴリ→50音。50音順ならカテゴリ→50音 */
  const cmp=(st,withCats)=>(a,b)=>{
    if(suggestSort==='freq'){ const fd=(b.freq||0)-(a.freq||0); if(fd) return fd; }
    return (withCats ? (catRank(st,a.category)-catRank(st,b.category)) : 0)
      || toHira(a.reading||a.name).localeCompare(toHira(b.reading||b.name),'ja');
  };
  matches.sort(cmp(store,hasCats));

  const sugTile=d=>{
    const el=document.createElement('div'); el.className='sug-tile';
    el.innerHTML='<div class="sug-icon"'+(d.color?' style="background:'+softOf(d.color)+';color:'+d.color+'"':'')+'>'+svgIcon(d.icon)+'</div><div class="sug-name">'+esc(d.name)+'</div>';
    el.onclick=()=>{ bumpFreq(d); sheetMode==='list' ? addItem(d.name,d.category,d.icon,d.color) : addStock(d.name,d.icon,d.store,d.color); };
    return el;
  };
  if(matches.length){
    if(sheetMode==='stock'){
      /* お店ごとに見出しを付け、その店のカテゴリ順→50音で並べる */
      const groups=[...STORES, {id:'_other',name:'その他',cats:[]}];
      groups.forEach(st=>{
        const inStore = st.id==='_other' ? matches.filter(d=>!storeById(d.store)) : matches.filter(d=>d.store===st.id);
        if(!inStore.length) return;
        inStore.sort(cmp(st,true));
        const sh=document.createElement('div'); sh.className='sub-head'; sh.textContent=st.name; suggest.appendChild(sh);
        const g=document.createElement('div'); g.className='sug-grid';
        inStore.forEach(d=> g.appendChild(sugTile(d))); suggest.appendChild(g);
      });
    }else{
      const g=document.createElement('div'); g.className='sug-grid';
      matches.forEach(d=> g.appendChild(sugTile(d))); suggest.appendChild(g);
    }
  }

  const typed=q.trim();
  if(typed!=='' && !matches.some(m=>m.name===typed)){
    const hasCats= sheetMode==='list' && store.cats.length>0;
    if(hasCats && newCat===null) newCat=store.cats[0];
    const card=document.createElement('div'); card.className='new-card';
    let chips=''; if(hasCats) store.cats.forEach(c=> chips+='<span class="cat-chip'+(c===newCat?' sel':'')+'" data-cat="'+c+'">'+c+'</span>');
    let ig=''; iconChoices(newIcon).forEach(k=> ig+='<div class="ic-pick'+(k===newIcon?' sel':'')+'" data-k="'+k+'">'+svgIcon(k)+'</div>');
    const rdVal=newReading||(KANA_ONLY.test(typed)?toHira(typed):'');
    card.innerHTML='<div class="new-top">「<b>'+esc(typed)+'</b>」を新しく追加</div>'+
      '<div class="ed-label" style="margin-top:0">ふりがな（自動・違ったら直す）</div>'+
      '<input id="newRd" class="ed-input" value="'+esc(rdVal).replace(/"/g,'&quot;')+'" placeholder="ひらがな" autocomplete="off" />'+
      (hasCats?'<div class="ed-label">カテゴリ</div><div class="cat-pick">'+chips+'</div>':'')+
      '<div class="ed-label">アイコン</div><div class="icon-grid">'+ig+'</div>'+
      '<div class="new-row" style="margin-top:14px"><div class="reg-toggle'+(regOn?' on':'')+'" id="regT"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>辞書に登録</div>'+
      '<button class="add-btn" id="addNew">追加する</button></div>';
    suggest.appendChild(card);
    const nr=card.querySelector('#newRd');
    if(nr){ nr.addEventListener('input',()=>{ newReading=nr.value; newReadingTouched=true; }); }
    if(hasCats) card.querySelectorAll('.cat-chip').forEach(ch=> ch.onclick=()=>{ newCat=ch.dataset.cat; renderSuggest(q); });
    card.querySelectorAll('.ic-pick').forEach(el=> el.onclick=()=>{ newIcon=el.dataset.k; renderSuggest(q); });
    card.querySelector('#regT').onclick=()=>{ regOn=!regOn; renderSuggest(q); };
    card.querySelector('#addNew').onclick=()=>{
      const reading=(newReading.trim()||toHira(typed));
      if(sheetMode==='list'){
        const cat=hasCats?newCat:'';
        if(regOn){ DICT.push({id:uid(),name:typed,reading,store:sheetStore,category:cat,icon:newIcon,color:'',freq:1}); save(); }
        addItem(typed,cat,newIcon,'');
      }else{
        const st=STORES[0].id;
        if(regOn){ DICT.push({id:uid(),name:typed,reading,store:st,category:'',icon:newIcon,color:'',freq:1}); save(); }
        addStock(typed,newIcon,st,'');
      }
    };
  }
}

function addItem(name,category,icon,color){
  const arr=state.items[sheetStore];
  const ex=arr.find(i=>i.name===name && (i.category||'')===(category||''));
  if(ex){ ex.qty++; } else arr.push({id:uid(),name,category:category||'',icon,color:color||'',qty:1,done:false});
  save(); render(); closeSheet();
}
function addStock(name,icon,store,color){
  addToStock(name,icon,store,1,color||''); save(); render(); closeSheet();
}

/* =====================================================================
   家族との共有（Firebase Realtime Database / 合言葉=ルームコード方式）
   - state まるごとを /rooms/{合言葉}/state に同期（最後に書いた人の内容が反映）
   - Firebaseの設定値は公開前提の値。秘密は「合言葉」とDBルール側で守る
   ===================================================================== */
const FIREBASE_CONFIG = {
  apiKey:      "AIzaSyAaB6hkAXU7t8EXMrdHy0vC4hmyy4SFoqc",
  authDomain:  "kaimonomemo-a9f51.firebaseapp.com",
  databaseURL: "https://kaimonomemo-a9f51-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:   "kaimonomemo-a9f51",
  appId:       "1:891065938449:web:f2b9e4f5e8eb7b27f6b7b0"
};
function fbConfigured(){ return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf('PASTE')<0; }

const SHARE_KEY='kaimono-share';
let share = (()=>{ try{ return JSON.parse(localStorage.getItem(SHARE_KEY))||{}; }catch(e){ return {}; } })();
if(!share.clientId){ share.clientId='c'+Math.random().toString(36).slice(2,10); localStorage.setItem(SHARE_KEY, JSON.stringify(share)); }
const CLIENT_ID=share.clientId;
function saveShare(){ localStorage.setItem(SHARE_KEY, JSON.stringify(share)); }

let fbApp=null, fbDb=null, fbRef=null, fbReady=false, fbOnline=false;
let applyingRemote=false, pushTimer=null;

async function fbInit(){
  if(fbReady) return true;
  if(!fbConfigured()) return false;
  if(!window.firebase || !firebase.initializeApp){ alert('オンライン機能の読み込みに失敗しました。ネット接続を確認して、開き直してください。'); return false; }
  try{
    if(!fbApp) fbApp=firebase.initializeApp(FIREBASE_CONFIG);
    fbDb=firebase.database();
    await firebase.auth().signInAnonymously();
    fbDb.ref('.info/connected').on('value', s=>{ fbOnline=!!s.val(); updateShareStatus(); });
    fbReady=true; return true;
  }catch(e){
    alert('つなぐのに失敗しました：'+((e&&e.message)||e)+'\n（Firebaseで「匿名」ログインを有効にしたか確認してください）');
    return false;
  }
}

function genCode(){ const a='abcdefghjkmnpqrstuvwxyz23456789'; let s=''; for(let i=0;i<8;i++) s+=a[Math.floor(Math.random()*a.length)]; return s; }

/* Firebaseは空配列/空オブジェクトを保存しないので、読み込み時に形を整える */
function normalizeState(s){
  s=s||{};
  s.stores = Array.isArray(s.stores)? s.stores : JSON.parse(JSON.stringify(DEFAULT_STORES));
  s.stores.forEach(st=>{ if(!Array.isArray(st.cats)) st.cats=[]; });
  s.dict = Array.isArray(s.dict)? s.dict : [];
  s.items = s.items || {};
  s.stores.forEach(st=>{ if(!Array.isArray(s.items[st.id])) s.items[st.id]=[]; });
  s.stock = Array.isArray(s.stock)? s.stock : [];
  return s;
}

function attachRoom(){
  if(!fbRef) return;
  fbRef.on('value', snap=>{
    const v=snap.val(); if(!v || !v.data) return;
    if(v.by===CLIENT_ID) return;              // 自分の書き込みのこだまは無視
    applyingRemote=true;
    state=normalizeState(v.data); STORES=state.stores; DICT=state.dict;
    localStorage.setItem(SKEY, JSON.stringify(state));
    render();
    if(seedExtraDict(true)) render();   // 同期データに追加候補が無ければ足して部屋にも反映
    applyingRemote=false;
  });
}
function detachRoom(){ if(fbRef){ fbRef.off(); fbRef=null; } }

function pushState(){
  if(!fbReady || !fbRef) return;
  fbRef.set({ by:CLIENT_ID, at:firebase.database.ServerValue.TIMESTAMP, data:state });
}
function schedulePush(){
  if(!fbReady || !fbRef) return;
  clearTimeout(pushTimer); pushTimer=setTimeout(pushState, 400);
}

function enterRoom(code, seed){
  detachRoom();
  share.roomCode=code; saveShare();
  fbRef=fbDb.ref('rooms/'+code+'/state');
  if(seed) pushState();                        // 自分のデータを部屋に置く（新規）
  attachRoom();                                // 既存部屋なら最初の値で取り込み
  renderShareSheet(); render();
}
async function shareCreate(){ if(!await fbInit()) return; enterRoom(genCode(), true); }
async function shareJoinInput(){
  const inp=$('#sh-code'); if(!inp) return;
  const code=(inp.value||'').trim().toLowerCase().replace(/\s/g,'');
  if(code.length<4){ alert('合言葉を入れてください。'); return; }
  if(!await fbInit()) return;
  const snap=await fbDb.ref('rooms/'+code+'/state').once('value');
  if(!snap.exists()){
    if(!confirm('その合言葉の部屋はまだありません。\n新しく作りますか？')) return;
    enterRoom(code, true);
  }else{
    if(!confirm('部屋に入ります。\nこの端末のデータは部屋の内容に置き換わります。よろしいですか？')) return;
    enterRoom(code, false);
  }
}
function shareLeave(){
  if(!confirm('共有から抜けますか？\n（このあとは端末内だけの保存に戻ります。今のデータはこの端末に残ります）')) return;
  detachRoom(); share.roomCode=null; saveShare(); renderShareSheet(); render();
}
async function shareResume(){
  if(!share.roomCode || !fbConfigured()) return;
  if(!await fbInit()) return;
  fbRef=fbDb.ref('rooms/'+share.roomCode+'/state');
  attachRoom();
}

/* ===== 共有シート ===== */
const shareSheet=$('#shareSheet'), scrim4=$('#scrim4');
scrim4.onclick=closeShareSheet;
function openShareSheet(){ renderShareSheet(); scrim4.classList.add('show'); shareSheet.classList.add('show'); }
function closeShareSheet(){ scrim4.classList.remove('show'); shareSheet.classList.remove('show'); }
function updateShareStatus(){
  const st=$('#sh-status'); if(!st) return;
  st.className='share-status'+(fbOnline?' on':'');
  const t=st.querySelector('.t'); if(t) t.textContent=fbOnline?'つながっています':'接続中…';
}
function renderShareSheet(){
  shareSheet.style.setProperty('--accent',NEUTRAL.accent); shareSheet.style.setProperty('--accent-soft','#EDEBE7');
  const b=$('#shareBody');
  if(!fbConfigured()){
    b.innerHTML='<h3>家族と共有</h3>'+
      '<p class="hint">使う前に、一度だけFirebaseのカンタンなセットアップが必要です。</p>'+
      '<div class="share-steps">'+
        '<b>1.</b> <code>console.firebase.google.com</code> で無料プロジェクトを作成<br>'+
        '<b>2.</b> 左メニュー「Realtime Database」を作成<br>'+
        '<b>3.</b> 「Authentication」→ ログイン方法 →「匿名」を有効化<br>'+
        '<b>4.</b> 設定（歯車）→ マイアプリ → Web を追加 → <b>firebaseConfig</b> をコピー<br>'+
        '<b>5.</b> その値を <code>index.html</code> の <code>FIREBASE_CONFIG</code> に貼って保存<br>'+
        '<b>6.</b> Database のルールに、私が渡すルールを貼る'+
      '</div>'+
      '<p class="hint" style="margin-top:12px">設定が終わって開き直すと、ここで合言葉が作れます。</p>';
    return;
  }
  if(!share.roomCode){
    b.innerHTML='<h3>家族と共有</h3>'+
      '<p class="hint">合言葉を作って家族に伝えると、同じ買い物メモをみんなで使えます。</p>'+
      '<button class="ed-save" id="sh-create" style="width:100%;margin:6px 0 18px">合言葉を作って共有を始める</button>'+
      '<div class="ed-label">家族の合言葉で参加する</div>'+
      '<div style="display:flex;gap:8px"><input id="sh-code" class="ed-input" placeholder="合言葉を入力" autocomplete="off" style="flex:1" />'+
        '<button class="ed-save" id="sh-join" style="padding:13px 18px">参加</button></div>';
    $('#sh-create').onclick=shareCreate;
    $('#sh-join').onclick=shareJoinInput;
    return;
  }
  b.innerHTML='<h3>家族と共有中</h3>'+
    '<p class="hint">この合言葉を家族に伝えてください。同じ言葉を入れた端末と同期します。</p>'+
    '<div class="share-code">'+esc(share.roomCode)+'</div>'+
    '<div class="share-status" id="sh-status"><span class="d"></span><span class="t">接続中…</span></div>'+
    '<button class="ed-save" id="sh-copy" style="width:100%;margin-bottom:10px">合言葉をコピー</button>'+
    '<button class="add-row" id="sh-leave" style="color:#C97B6B">共有から抜ける</button>';
  $('#sh-copy').onclick=()=>{ try{ navigator.clipboard.writeText(share.roomCode); }catch(e){} const c=$('#sh-copy'); if(c){ c.textContent='コピーしました'; setTimeout(()=>{ const c2=$('#sh-copy'); if(c2) c2.textContent='合言葉をコピー'; },1200); } };
  $('#sh-leave').onclick=shareLeave;
  updateShareStatus();
}

seedExtraDict(); renderTabs(); render(); shareResume();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
